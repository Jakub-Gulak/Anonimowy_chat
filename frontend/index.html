<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Anonimowy Chat - JGU</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="adminInfo"></div>

    <div class="chat-container">

        <h1>Anonimowy Chat</h1>

        <button
            id="adminButton"
            onclick="window.location.href='admin.html'">
            Strefa administratora
        </button>

        <br><br>

        <div class="input-row">
            <input
                type="text"
                id="messageInput"
                placeholder="Wpisz wiadomość"
                maxlength="200">

            <button onclick="sendMessage()">
                Wyślij
            </button>
        </div>

        <div id="messages"></div>

    </div>

    <script src="app.js"></script>

</body>
</html>
