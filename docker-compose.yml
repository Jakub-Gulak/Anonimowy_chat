services:
  mysql:
    image: mysql:8.0

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: chat_db

    ports:
      - "3306:3306"

    volumes:
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql

  php:
    build: .

    ports:
      - "8080:80"

    volumes:
      - ./backend:/var/www/html

    depends_on:
      - mysql